// Contract between EA (client) and Experior microservice (server)
syntax = "proto3";

package microservice

// List of microservice definitions

service MakeComparison {
   rpc Is_x_bigger (ComparisonInput) returns (ComparisonReply) {}
}

// List of microservice messages

message ComparisonInput {
  float x = 0;
  float y = 0;
}

message ComparisonReply {
  bool reply = 0;
}
